<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head(title='Notifications')}"></head>
<body>
<div th:replace="~{fragments/layout :: page(title='Notifications', content=~{::content})}">
  <div th:fragment="content">
    <section class="mb-4" style="display:flex; justify-content:space-between; align-items:flex-end; gap:16px;">
      <div>
        <h1 class="h2 mb-2">Thông báo của tôi</h1>
        <p class="muted">Xem và cập nhật các thông báo mới nhất từ hệ thống và giáo viên của bạn.</p>
      </div>
      <form th:action="@{/notifications/mark-read}" method="post" th:if="${not #lists.isEmpty(notifications)}">
        <button type="submit" class="btn btn-soft btn-sm flex items-center gap-1" style="font-weight: 800; border-radius: 10px; cursor: pointer;">
          <i data-lucide="check-check"></i> Đánh dấu tất cả đã đọc
        </button>
      </form>
    </section>

    <!-- Notification Cards List -->
    <div class="flex flex-col gap-3" style="display:flex; flex-direction:column; gap:12px; max-width: 800px;">
      <div class="card card-pad" th:each="n : ${notifications}" 
           th:style="${n.isRead == false ? 'border-left: 5px solid var(--primary); background:#fcfdfe;' : 'border-left: 5px solid var(--border);'}">
        <div class="flex items-start gap-3">
          <div class="stat-icon" th:classappend="${n.isRead == false ? 'bg-primary-light text-primary' : 'bg-slate-light text-muted'}" style="width:36px; height:36px; border-radius:10px; flex-shrink:0;">
            <i th:attr="data-lucide=${n.isRead == false ? 'bell' : 'bell-off'}"></i>
          </div>
          <div style="flex:1; min-width:0;">
            <div class="flex items-center justify-between mb-1" style="display:flex; justify-content:space-between; align-items:center;">
              <h3 class="h3 font-extrabold mb-0" style="font-size:14.5px;" th:text="${n.title}">Welcome!</h3>
              <span class="small muted" style="font-size:11.5px;" th:text="${#temporals.format(n.createdAt, 'dd/MM/yyyy HH:mm')}">Date</span>
            </div>
            <p class="small text-muted mb-0" style="line-height:1.5; color:#475569;" th:text="${n.message}">Welcome message...</p>
          </div>
        </div>
      </div>

      <!-- Empty State -->
      <div class="card card-pad text-center" th:if="${#lists.isEmpty(notifications)}">
        <div style="font-size: 2.5rem; color: var(--muted);" class="mb-2"><i data-lucide="bell"></i></div>
        <p class="muted">Bạn không có thông báo nào.</p>
      </div>
    </div>
  </div>
</div>
<script th:replace="~{fragments/layout :: scripts}"></script>
</body>
</html>
