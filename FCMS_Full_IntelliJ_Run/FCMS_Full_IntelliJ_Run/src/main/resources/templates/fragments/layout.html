<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<!--
  Thymeleaf Fragment Layout — dùng chung cho TEACHER và STUDENT.
  Sử dụng: th:replace="~{fragments/layout :: page(title='...', content=~{::content})}"
-->
<head th:fragment="head(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title} + ' - FCMS'">FCMS</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/fcms.css}">
    <script src="https://unpkg.com/lucide@latest" defer></script>
</head>

<body>
<!-- ═══════════════════════════════════════════════════════
     FULL PAGE FRAGMENT — th:replace với content block
     ════════════════════════════════════════════════════ -->
<div th:fragment="page(title, content)" class="page">

    <!-- ══════════ SIDEBAR ══════════ -->
    <aside class="sidebar" id="sidebar">

        <!-- Brand -->
        <div class="brand">
            <div class="logo">📚</div>
            <div>
                <div class="brand-title">FCMS</div>
                <div class="brand-sub" th:text="${session.currentUserRole == 'TEACHER'} ? 'Teacher Portal' : 'Student Portal'">Portal</div>
            </div>
        </div>

        <!-- ── TEACHER NAV ── -->
        <nav class="nav" th:if="${session.currentUserRole == 'TEACHER'}">
            <a th:href="@{/dashboard}"
               th:classappend="${activePage == 'dashboard'} ? 'active'">
                <i data-lucide="layout-dashboard"></i> Dashboard
            </a>
            <a th:href="@{/teacher/classes}"
               th:classappend="${activePage == 'classes'} ? 'active'">
                <i data-lucide="book-open"></i> My Classes
            </a>
            <a th:href="@{/teacher/question-bank}"
               th:classappend="${activePage == 'questions'} ? 'active'">
                <i data-lucide="help-circle"></i> Question Bank
            </a>
            <a th:href="@{/teacher/progress}"
               th:classappend="${activePage == 'progress'} ? 'active'">
                <i data-lucide="bar-chart-2"></i> Student Progress
            </a>
            <a th:href="@{/notifications}"
               th:classappend="${activePage == 'notifications'} ? 'active'"
               class="relative">
                <i data-lucide="bell"></i> Notifications
                <span class="dot" id="notifDot" style="display:none;"></span>
            </a>
        </nav>

        <!-- ── STUDENT NAV ── -->
        <nav class="nav" th:if="${session.currentUserRole == 'STUDENT'}">
            <a th:href="@{/dashboard}"
               th:classappend="${activePage == 'dashboard'} ? 'active'">
                <i data-lucide="layout-dashboard"></i> Dashboard
            </a>
            <a th:href="@{/student/classes}"
               th:classappend="${activePage == 'classes'} ? 'active'">
                <i data-lucide="book-open"></i> My Classes
            </a>
            <a th:href="@{/student/assignments}"
               th:classappend="${activePage == 'assignments'} ? 'active'">
                <i data-lucide="clipboard-list"></i> Assignments
            </a>
            <a th:href="@{/student/ai-practice}"
               th:classappend="${activePage == 'ai'} ? 'active'">
                <i data-lucide="bot"></i> AI Practice
            </a>

            <a th:href="@{/student/progress}"
               th:classappend="${activePage == 'progress'} ? 'active'">
                <i data-lucide="trending-up"></i> My Progress
            </a>
            <a th:href="@{/notifications}"
               th:classappend="${activePage == 'notifications'} ? 'active'"
               class="relative">
                <i data-lucide="bell"></i> Notifications
                <span class="dot" id="notifDot" style="display:none;"></span>
            </a>
        </nav>

        <!-- Profile box + Logout -->
        <div class="profile-box">
            <img th:if="${!#strings.isEmpty(currentUser.avatarUrl)}"
                 th:src="${currentUser.avatarUrl}"
                 alt="Avatar"
                 data-user-avatar-img
                 style="width:38px; height:38px; border-radius:50%; object-fit:cover; flex-shrink:0;">
            <div th:if="${#strings.isEmpty(currentUser.avatarUrl)}"
                 class="avatar"
                 data-user-avatar-fallback
                 th:classappend="${session.currentUserRole == 'STUDENT'} ? 'student'"
                 th:text="${#strings.substring(currentUser.fullName, 0, 1)}">A</div>
            <div style="flex:1; min-width:0;">
                <div class="profile-name" th:text="${currentUser.fullName}">Name</div>
                <div class="profile-role" th:text="${#strings.toLowerCase(session.currentUserRole)}">role</div>
            </div>
            <a th:href="@{/profile}" title="Profile" style="color:var(--muted);">
                <i data-lucide="settings" style="width:15px;"></i>
            </a>
        </div>

        <!-- Logout -->
        <div style="padding: 0 12px 16px;">
            <button onclick="logout()"
                    style="width:100%; padding:9px; border-radius:12px; background:#fee2e2;
                           color:#dc2626; font-size:13px; font-weight:700; cursor:pointer;
                           border:none; display:flex; align-items:center; justify-content:center; gap:6px;">
                <i data-lucide="log-out" style="width:14px;"></i> Sign Out
            </button>
        </div>
    </aside>

    <!-- ══════════ MAIN SHELL ══════════ -->
    <div class="shell">

        <!-- Top bar -->
        <header class="topbar">
            <!-- Mobile menu toggle -->
            <button class="icon-btn" onclick="toggleSidebar()" id="menuBtn" title="Menu">
                <i data-lucide="menu"></i>
            </button>

            <span class="top-title" th:text="${title}">Page Title</span>

            <div style="display:flex; align-items:center; gap:8px; margin-left:auto;">
                <!-- Notification bell -->
                <div class="relative">
                    <a th:href="@{/notifications}" class="icon-btn">
                        <i data-lucide="bell"></i>
                    </a>
                    <span class="dot" id="topNotifDot" style="display:none;"></span>
                </div>

                <!-- Avatar dropdown -->
                <div style="position:relative;">
                    <button class="icon-btn" onclick="toggleUserMenu()" id="userMenuBtn"
                            style="gap:6px; width:auto; padding:4px 10px 4px 4px;">
                        <img th:if="${!#strings.isEmpty(currentUser.avatarUrl)}"
                             th:src="${currentUser.avatarUrl}"
                             alt="Avatar"
                             data-user-avatar-img
                             style="width:30px; height:30px; border-radius:50%; object-fit:cover; flex-shrink:0;">
                        <div th:if="${#strings.isEmpty(currentUser.avatarUrl)}"
                             class="avatar"
                             data-user-avatar-fallback
                             th:classappend="${session.currentUserRole == 'STUDENT'} ? 'student'"
                             th:text="${#strings.substring(currentUser.fullName, 0, 1)}"
                             style="width:30px; height:30px; font-size:11px;">A</div>
                        <span style="font-size:13px; font-weight:700; max-width:100px;"
                              class="truncate" th:text="${currentUser.fullName}">Name</span>
                        <i data-lucide="chevron-down" style="width:14px; color:var(--muted);"></i>
                    </button>

                    <!-- Dropdown -->
                    <div id="userMenu" style="display:none; position:absolute; right:0; top:calc(100% + 6px);
                         background:white; border:1px solid var(--border); border-radius:14px;
                         box-shadow:0 10px 30px rgba(15,23,36,.12); padding:8px; min-width:180px; z-index:100;">
                        <div style="padding:10px 12px 8px; border-bottom:1px solid var(--border); margin-bottom:6px;">
                            <div style="font-weight:700; font-size:13px;" th:text="${currentUser.fullName}">Name</div>
                            <div style="font-size:11px; color:var(--muted);" th:text="${currentUser.email}">email</div>
                        </div>
                        <a th:href="@{/profile}"
                           style="display:flex; align-items:center; gap:8px; padding:9px 12px;
                                  border-radius:10px; color:var(--text); font-size:13px; font-weight:600;">
                            <i data-lucide="user" style="width:15px;"></i> My Profile
                        </a>
                        <button onclick="logout()"
                                style="width:100%; display:flex; align-items:center; gap:8px; padding:9px 12px;
                                       border-radius:10px; color:#dc2626; font-size:13px; font-weight:600;
                                       background:none; border:none; cursor:pointer; text-align:left;">
                            <i data-lucide="log-out" style="width:15px;"></i> Sign Out
                        </button>
                    </div>
                </div>
            </div>
        </header>

        <!-- Main content slot -->
        <main class="content">
            <th:block th:replace="${content}"/>
        </main>
    </div>
</div>

<!-- ══════════ SCRIPTS ══════════ -->
<script th:fragment="scripts">
    lucide.createIcons();

    // Logout
    async function logout() {
        await fetch('/api/auth/logout', { method: 'POST' });
        window.location.href = '/login';
    }

    // Toggle user dropdown
    function toggleUserMenu() {
        const menu = document.getElementById('userMenu');
        menu.style.display = menu.style.display === 'none' ? 'block' : 'none';
    }
    document.addEventListener('click', (e) => {
        if (!document.getElementById('userMenuBtn')?.contains(e.target)) {
            const m = document.getElementById('userMenu');
            if (m) m.style.display = 'none';
        }
    });

    // Mobile sidebar toggle
    function toggleSidebar() {
        document.getElementById('sidebar').classList.toggle('mobile-open');
    }
</script>
</body>
</html>
