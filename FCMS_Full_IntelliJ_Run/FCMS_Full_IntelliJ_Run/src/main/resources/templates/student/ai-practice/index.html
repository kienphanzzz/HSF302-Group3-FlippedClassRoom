<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Practice Setup - FCMS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" th:href="@{/css/fcms.css}" href="../../../static/css/fcms.css" />
</head>
<body>
<div class="page">
  <aside class="sidebar">
    <div class="brand">
      <div class="logo"><i data-lucide="book-open"></i></div>
      <div>
        <div class="brand-title">FCMS</div>
        <div class="brand-sub">Student Portal</div>
      </div>
    </div>
    <nav class="nav">
      <a th:href="@{/student/learning-path}"><i data-lucide="book-open"></i> My Learning Path</a>
      <a th:href="@{/student/classes}"><i data-lucide="grid"></i> Joined Classes</a>
      <a th:href="@{/student/assignments}"><i data-lucide="clipboard-list"></i> Assignments</a>
      <a class="active" th:href="@{/student/ai-practice}"><i data-lucide="zap"></i> AI Practice</a>
      <a th:href="@{/student/progress}"><i data-lucide="bar-chart-2"></i> Progress Dashboard</a>
    </nav>
    <div class="profile-box">
      <div class="avatar student" th:text="${#strings.substring(studentName ?: 'AN',0,2)}">AN</div>
      <div class="truncate">
        <div class="profile-name" th:text="${studentName ?: 'Alex Nguyen'}">Alex Nguyen</div>
        <div class="profile-role">student</div>
      </div>
    </div>
  </aside>

  <div class="shell">
    <header class="topbar">
      <div class="top-title">AI Practice Setup</div>
      <div class="switcher">
        <a class="active" th:href="@{/student/ai-practice}">AI Practice Setup</a>
        <a th:href="@{/student/ai-practice/history}">Practice History</a>
      </div>
      <button class="icon-btn relative"><i data-lucide="bell"></i></button>
      <div class="avatar student" style="width:34px;height:34px" th:text="${#strings.substring(studentName ?: 'AN',0,2)}">AN</div>
    </header>

    <main class="content">
      <!-- Warnings Alert -->
      <div class="card card-pad mb-4 bg-orange-light border-orange text-accent flex items-start gap-3">
        <i data-lucide="alert-triangle" style="width:24px;height:24px;flex-shrink:0;"></i>
        <div>
          <strong style="display:block;" class="mb-1">Self-Study Warning</strong>
          <span class="small font-bold">AI practice is for self-study only and does not affect official grades.</span>
        </div>
      </div>

      <!-- Setup Form -->
      <div class="card card-pad" style="max-width: 680px; margin: 0 auto;">
        <h2 class="h2 mb-4 text-primary"><i data-lucide="cpu" style="vertical-align: text-bottom;"></i> Generate Practice Session</h2>
        
        <form th:action="@{/student/ai-practice/generate}" method="POST">
          <!-- Practice Mode Selection -->
          <div class="mb-3">
            <label class="form-label" style="font-weight:750;">Practice Material Source</label>
            <div class="flex items-center gap-4 mt-2">
              <label class="flex items-center gap-2 cursor-pointer">
                <input type="radio" name="practiceMode" value="MATERIAL" checked id="modeMaterialRadio" />
                <span>Class Material</span>
              </label>
              <label class="flex items-center gap-2 cursor-pointer">
                <input type="radio" name="practiceMode" value="LINK" id="modeLinkRadio" />
                <span>Custom Link</span>
              </label>
              <label class="flex items-center gap-2 cursor-pointer">
                <input type="radio" name="practiceMode" value="FILE" id="modeFileRadio" />
                <span>Upload File (.pdf/.pptx)</span>
              </label>
            </div>
          </div>

          <!-- Existing dropdown container -->
          <div class="form-group mb-3" id="materialSourceContainer">
            <label class="form-label font-bold">Select Study Material</label>
            <select name="contentId" id="materialSelect" class="form-control">
              <option value="">-- Choose a document or video --</option>
              <!-- Loop Materials -->
              <option th:each="content : ${contents}" 
                      th:value="${content.contentId}" 
                      th:text="${content.learningNode.classRoom.classCode} + ' - ' + ${content.title} + ' (' + ${content.contentType} + ')'"></option>
            </select>
          </div>

          <!-- Custom Link container -->
          <div class="mb-3" id="linkSourceContainer" style="display: none;">
            <div class="form-group mb-2">
              <label class="form-label font-bold">Paste URL Link</label>
              <input type="url" name="linkUrl" id="linkUrlInput" class="form-control" placeholder="https://example.com/syllabus-or-slides" />
            </div>
            <div class="form-group">
              <label class="form-label font-bold">Associate with Topic / Learning Node</label>
              <select name="nodeId" id="linkNodeSelect" class="form-control">
                <option value="">-- Choose Topic Node --</option>
                <option th:each="node : ${nodes}" 
                        th:value="${node.nodeId}" 
                        th:text="${node.classRoom.classCode} + ' - ' + ${node.title}"></option>
              </select>
            </div>
          </div>

          <!-- Custom File Upload container -->
          <div class="mb-3" id="fileSourceContainer" style="display: none;">
            <div class="form-group mb-2">
              <label class="form-label font-bold">Choose PowerPoint/PDF File</label>
              <input type="file" id="customPracticeFile" class="form-control" />
              <input type="hidden" name="customFileName" id="customFileName" />
            </div>
            <div class="form-group">
              <label class="form-label font-bold">Associate with Topic / Learning Node</label>
              <select name="nodeId" id="fileNodeSelect" class="form-control">
                <option value="">-- Choose Topic Node --</option>
                <option th:each="node : ${nodes}" 
                        th:value="${node.nodeId}" 
                        th:text="${node.classRoom.classCode} + ' - ' + ${node.title}"></option>
              </select>
            </div>
          </div>

          <script>
            document.addEventListener('DOMContentLoaded', function() {
              const materialRadio = document.getElementById('modeMaterialRadio');
              const linkRadio = document.getElementById('modeLinkRadio');
              const fileRadio = document.getElementById('modeFileRadio');
              
              const materialContainer = document.getElementById('materialSourceContainer');
              const linkContainer = document.getElementById('linkSourceContainer');
              const fileContainer = document.getElementById('fileSourceContainer');
              
              const materialSelect = document.getElementById('materialSelect');
              const linkUrlInput = document.getElementById('linkUrlInput');
              const linkNodeSelect = document.getElementById('linkNodeSelect');
              const customFile = document.getElementById('customPracticeFile');
              const fileNodeSelect = document.getElementById('fileNodeSelect');
              const customFileNameInput = document.getElementById('customFileName');

              materialRadio.addEventListener('change', toggleContainers);
              linkRadio.addEventListener('change', toggleContainers);
              fileRadio.addEventListener('change', toggleContainers);

              function toggleContainers() {
                materialContainer.style.display = materialRadio.checked ? 'block' : 'none';
                linkContainer.style.display = linkRadio.checked ? 'block' : 'none';
                fileContainer.style.display = fileRadio.checked ? 'block' : 'none';
                
                // Toggle required states
                materialSelect.required = materialRadio.checked;
                linkUrlInput.required = linkRadio.checked;
                linkNodeSelect.required = linkRadio.checked;
                fileNodeSelect.required = fileRadio.checked;
              }

              // Set default required
              materialSelect.required = true;

              // Populate filename on select
              customFile.addEventListener('change', function() {
                if (customFile.files && customFile.files.length > 0) {
                  customFileNameInput.value = customFile.files[0].name;
                }
              });
            });
          </script>

          <div class="grid mb-3" style="display:grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
            <div class="form-group">
              <label class="form-label" style="font-weight:750;">Difficulty Level</label>
              <select name="difficulty" class="form-control" required>
                <option value="EASY">Easy</option>
                <option value="MEDIUM" selected>Medium</option>
                <option value="HARD">Hard</option>
              </select>
            </div>
            <div class="form-group">
              <label class="form-label" style="font-weight:750;">Question Type</label>
              <select name="questionType" class="form-control" required>
                <option value="MCQ" selected>Multiple Choice (MCQ)</option>
                <option value="TRUE_FALSE">True / False</option>
                <option value="SHORT_ANSWER">Short Answer / Essay</option>
              </select>
            </div>
          </div>

          <div class="form-group mb-4">
            <label class="form-label" style="font-weight:750;">Number of Questions (1 - 10)</label>
            <input type="number" name="count" class="form-control" min="1" max="10" value="5" required />
          </div>

          <button type="submit" class="btn btn-primary w-full flex items-center justify-center gap-2">
            <i data-lucide="zap"></i> Generate Questions
          </button>
        </form>
      </div>
    </main>
  </div>
</div>
<script src="https://unpkg.com/lucide@latest"></script>
<script th:src="@{/js/fcms.js}" src="../../../static/js/fcms.js"></script>
</body>
</html>
